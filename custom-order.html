<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Order | Fibello Sweets</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="Main navigation">
        <a class="brand" href="index.html" aria-label="Fibello home"><img src="assets/fibello-logo.png" alt="Fibello Sweets logo" /></a>
        <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false"><span></span><span></span><span></span></button>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="contact.html">Contact Us</a>
          <a href="locations.html">Locations</a>
          <a class="active" href="custom-order.html">Custom Order</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="page active">
        <div class="page-hero compact">
          <p class="eyebrow">Build your celebration</p>
          <h1>Custom Cake Studio</h1>
          <p>Design a cake, watch the preview change, and see the price update instantly.</p>
        </div>
        <section class="section cake-studio">
          <div class="cake-preview-wrap">
            <div class="cake-preview" id="cake-preview" aria-label="Live cake preview">
              <div class="cake-layer layer-three"></div>
              <div class="cake-layer layer-two"></div>
              <div class="cake-layer layer-one"></div>
              <div class="cake-text" id="cake-text-preview">Fibello</div>
              <div class="candles" id="candles-preview"></div>
            </div>
            <div class="price-card">
              <span>Estimated total</span>
              <strong id="cake-price">$48</strong>
            </div>
          </div>
          <form class="builder-form" id="cake-form">
            <div class="control-grid">
              <label>Shape<select name="shape"><option>Round</option><option>Square</option><option>Heart</option><option>Custom</option></select></label>
              <label>Size<select name="size"><option value="6">6 inch</option><option value="8">8 inch</option><option value="10">10 inch</option><option value="12">12 inch</option></select></label>
              <label>Layers<select name="layers"><option value="1">1 layer</option><option value="2">2 layers</option><option value="3" selected>3 layers</option></select></label>
              <label>Icing<select name="icing"><option>Vanilla Cream</option><option>Chocolate Ganache</option><option>Strawberry Buttercream</option><option>Caramel Whip</option></select></label>
              <label>Flavor<select name="flavor"><option>Vanilla Bean</option><option>Chocolate Fudge</option><option>Red Velvet</option><option>Lemon Cloud</option></select></label>
              <label>Decorations<select name="decorations"><option>Fresh Berries</option><option>Chocolate Drizzle</option><option>Gold Sprinkles</option><option>Floral Piping</option></select></label>
              <label>Toppings<select name="toppings"><option>Macarons</option><option>Truffles</option><option>Fruit Crown</option><option>Cookie Crumble</option></select></label>
              <label>Candles<select name="candles"><option value="0">No candles</option><option value="3">3 candles</option><option value="6">6 candles</option><option value="12">12 candles</option></select></label>
              <label>Text writing<input name="text" maxlength="18" placeholder="Happy Birthday" /></label>
              <label>Date<input type="date" name="date" required /></label>
            </div>
            <label>Special requests<textarea name="notes" rows="3" placeholder="Colors, allergies, theme, delivery notes"></textarea></label>
            <div class="control-grid">
              <label>Full name<input name="customer" required /></label>
              <label>Phone number<input name="phone" required /></label>
              <label>Address<input name="address" required /></label>
            </div>
            <button class="frost-btn primary wide" type="submit">Order Cake</button>
            <p class="form-status" role="status"></p>
          </form>
        </section>
      </section>
    </main>

    <footer class="footer">
      <div><strong>Fibello Sweets</strong><p>Premium cakes, pastries, and custom desserts.</p></div>
      <div><a href="mailto:hello@fibellosweets.com">hello@fibellosweets.com</a><span>(555) 019-3221</span></div>
    </footer>

    <script type="module" src="js/nav.js"></script>
    <script type="module" src="js/custom-order.js"></script>
  </body>
</html>
